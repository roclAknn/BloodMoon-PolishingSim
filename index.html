<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="canonical" href="https://roclaknn.github.io/BloodMoon-PolishingSim/">
  <title>/MapleStory/ 紅き月の森 研磨シミュレーター</title>
  <meta name="description" content="イニスの宝玉の研磨強化(左ライン)をリセットするかの参考用ツール">
  <meta name="google-site-verification" content="vkAHjrHWlxI9ch267E96FHR8p9ajVqys8hCnFSBES8A" />
  <script src="chart3.9.1.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
      min-height: 100vh;
      padding: 1rem;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      color: #1e293b;
      font-size: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .selects-div {
      display: flex;
      flex-direction: row;
    }
    .selects-div .select-div {
      display: flex;
      flex-direction: column;
      flex: 1;
      gap: 10px;
    }
    .select-div select {
      width: 200px;
      height: 2.5rem;
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 8px 4px;
      text-align: center;
      font-size: 16px;
      margin-top: 0.75rem;
      margin-bottom: 0.75rem;
    }
    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .input-section label {
      display: block;
      font-size: 1.1rem;
      font-weight: 600;
      color: #334155;
    }
    .slider-box {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 0.75rem;
    }
    .range-value {
      width: 3rem;
      font-size: 2rem;
      font-weight: bold;
      color: #2563eb;
      text-align: center;
      flex-shrink: 0;
    }
    /* スライダー：広いタップ領域 + トラック下に目盛り */
    .range-shell {
      flex: 1;
      position: relative;
      min-height: 52px;
      display: flex;
      align-items: center;
      --range-thumb-r: 15px;
      --range-track-h: 11px;
    }
    .range-track {
      position: absolute;
      left: var(--range-thumb-r);
      right: var(--range-thumb-r);
      top: 50%;
      transform: translateY(-50%);
      height: var(--range-track-h);
      border-radius: 999px;
      background: #e2e8f0;
      box-shadow: inset 0 1px 2px rgba(15, 23, 42, 0.08);
      pointer-events: none;
    }
    .range-fill {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, #4f46e5, #7c8ef5);
      pointer-events: none;
    }
    .range-ticks {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      bottom: 0;
      pointer-events: none;
    }
    .range-tick {
      position: absolute;
      top: -4px;
      bottom: -4px;
      width: 2px;
      transform: translateX(-50%);
      background: rgba(15, 23, 42, 0.22);
      border-radius: 1px;
    }
    input[type="range"].range-field {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 48px;
      margin: 0;
      background: transparent;
      cursor: pointer;
      position: relative;
      z-index: 1;
      outline: none;
    }
    input[type="range"].range-field::-webkit-slider-runnable-track {
      height: var(--range-track-h);
      background: transparent;
      border-radius: 999px;
    }
    input[type="range"].range-field::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: calc(var(--range-thumb-r) * 2);
      height: calc(var(--range-thumb-r) * 2);
      margin-top: calc((var(--range-track-h) - var(--range-thumb-r) * 2) / 2);
      border-radius: 50%;
      background: linear-gradient(180deg, #3b82f6, #1d4ed8);
      border: 3px solid #fff;
      box-shadow: 0 2px 10px rgba(37, 99, 235, 0.45);
    }
    input[type="range"].range-field::-moz-range-track {
      height: var(--range-track-h);
      background: transparent;
      border-radius: 999px;
    }
    input[type="range"].range-field::-moz-range-thumb {
      width: calc(var(--range-thumb-r) * 2);
      height: calc(var(--range-thumb-r) * 2);
      border-radius: 50%;
      background: linear-gradient(180deg, #3b82f6, #1d4ed8);
      border: 3px solid #fff;
      box-shadow: 0 2px 10px rgba(37, 99, 235, 0.45);
      box-sizing: border-box;
    }
    input[type="range"].range-field:focus-visible::-webkit-slider-thumb {
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.35), 0 2px 10px rgba(37, 99, 235, 0.45);
    }
    input[type="range"].range-field:focus-visible::-moz-range-thumb {
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.35), 0 2px 10px rgba(37, 99, 235, 0.45);
    }
    .card h2 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #334155;
      margin-bottom: 1rem;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    thead tr {
      border-bottom: 2px solid #cbd5e1;
    }
    th {
      padding: 0.75rem;
      text-align: left;
      color: #475569;
      font-weight: 600;
    }
    th:last-child {
      text-align: right;
    }
    tbody tr {
      border-bottom: 1px solid #e2e8f0;
    }
    tbody tr:hover {
      background: #f8fafc;
    }
    td {
      padding: 0.75rem;
      color: #1e293b;
    }
    td:last-child {
      text-align: right;
      font-weight: 500;
    }
    canvas {
      max-height: 300px;
    }
    @media (max-width: 640px) {
      h1 {
        font-size: 1.25rem;
      }
      .card {
        padding: 1rem;
      }
      .stage-value {
        font-size: 2rem;
      }
      table {
        font-size: 0.85rem;
      }
      th, td {
        padding: 0.5rem;
      }
    }
    
  </style>
</head>
<body>
  <div class="container">
    <h1>紅き月の森 研磨シミュレーター</h1>
    
    <div class="card input-section">
      <div class="selects-div">
        <div class="select-div">
          <label>職業</label>
          <select id="jobSelect" onchange="updateDisplay();">
            <option value="normal" selected>一般</option>
            <option value="da">デーモンアヴェンジャー</option>
            <option value="xenon">ゼノン</option>
          </select>
        </div>
        <div class="select-div">
          <label>研磨計測開始レベル</label>
          <select id="polishStartSelect" onchange="updateDisplay();">
            <option value="0" selected>0</option>
            <option value="10">10</option>
            <option value="15">15</option>
          </select>
        </div>
      </div>
      <label>研磨レベル(左)</label>
      <div class="slider-box">
        <div class="range-value" id="polishValue">0</div>
        <div class="range-shell">
          <div class="range-track" aria-hidden="true">
            <div class="range-fill" id="polishFill"></div>
            <div class="range-ticks" id="polishTicks"></div>
          </div>
          <input type="range" id="polishSlider" class="polishSlider range-field" min="0" max="20" value="0">
        </div>
      </div>
      
      <label>加工レベル(右)</label>
      <div class="slider-box">
        <div class="range-value" id="stageValue">0</div>
        <div class="range-shell">
          <div class="range-track" aria-hidden="true">
            <div class="range-fill" id="stageFill"></div>
            <div class="range-ticks" id="stageTicks"></div>
          </div>
          <input type="range" id="stageSlider" class="stageSlider range-field" min="0" max="20" value="0">
        </div>
      </div>
    </div>

    <div class="card">
      <h2 id="chartTitle">点数以上になる確率（グラフ）</h2>
      <canvas id="chart"></canvas>
    </div>
    
    <div class="card">
      <h2 id="tableTitle">点数以上になる確率（テーブル）</h2>
      <table>
        <thead>
          <tr>
            <th>点数</th>
            <th>確率</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

  </div>

  <script>
    const jobselect = document.getElementById('jobSelect');
    const startpolishselect = document.getElementById('polishStartSelect');
    const polishslider = document.getElementById('polishSlider');
    const polishvalue = document.getElementById('polishValue');
    const slider = document.getElementById('stageSlider');
    const stageValue = document.getElementById('stageValue');
    const tableBody = document.getElementById('tableBody');
    const polishFill = document.getElementById('polishFill');
    const stageFill = document.getElementById('stageFill');
    const polishTicks = document.getElementById('polishTicks');
    const stageTicks = document.getElementById('stageTicks');
    const chartTitle = document.getElementById('chartTitle');
    const tableTitle = document.getElementById('tableTitle');

    /** 左トラックの塗り（ドラッグ中も input で同期） */
    function syncRangeFills() {
      const pmax = Math.max(1, +polishslider.max);
      const smax = Math.max(1, +slider.max);
      const p = +polishslider.value;
      const s = +slider.value;
      polishFill.style.width = `${(p / pmax) * 100}%`;
      stageFill.style.width = `${(s / smax) * 100}%`;
    }

    /** 5 刻みの区切り線（0 と max は除く） */
    function rebuildTicks(container, maxVal) {
      container.innerHTML = '';
      const m = Math.max(0, Math.floor(Number(maxVal)));
      for (let v = 5; v < m; v += 5) {
        const el = document.createElement('div');
        el.className = 'range-tick';
        el.style.left = `${(v / m) * 100}%`;
        container.appendChild(el);
      }
    }

    function refreshRangeTicks() {
      const m = +polishslider.max;
      rebuildTicks(polishTicks, m);
      rebuildTicks(stageTicks, m);
    }
    
    // 不均一幅ラベル
    const labels = [0, 2, 5, 10, 20, 30, 40, 50, 60, 80, 100];
    
    const backgroundZones = [
      { from: 0, to: 3, color: 'rgba(255, 230, 230, 0.5)' },
      { from: 3, to: 8, color: 'rgba(230, 255, 230, 0.5)' },
      { from: 8, to: 10, color: 'rgba(230, 230, 255, 0.5)' }
    ];
    
    // 入力データX値を描画座標に変換する
    function mapXToLinearIndex(x) {
      for (let i = 0; i < labels.length - 1; i++) {
        const x1 = labels[i];
        const x2 = labels[i + 1];
        if (x >= x1 && x <= x2) {
          // 区間 [x1, x2] を [i, i+1] にマッピング
          return i + (x - x1) / (x2 - x1);
        }
      }
      // 範囲外なら外挿
      if (x < labels[0]) return 0;
      if (x > labels[labels.length - 1]) return labels.length - 1;
      return x;
    }
    // プラグイン：区間背景を描画
    const backgroundPlugin = {
      id: 'zoneBackground',
      beforeDatasetsDraw(chart, args, opts) {
        const { ctx, chartArea, scales: { x, y } } = chart;
        ctx.save();
        backgroundZones.forEach(zone => {
          const xStart = x.getPixelForValue(zone.from);
          const xEnd = x.getPixelForValue(zone.to);
          ctx.fillStyle = zone.color;
          ctx.fillRect(xStart, chartArea.top, xEnd - xStart, chartArea.bottom - chartArea.top);
        });
        ctx.restore();
      }
    };
    
    // グラフ初期化
    const ctx = document.getElementById('chart').getContext('2d');
    const chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: [],
        datasets: [{
          label: '',
          data: [],
          borderColor: '#2563eb',
          backgroundColor: 'rgba(37, 99, 235, 0.1)',
          tension: 0.4,
          pointRadius: 0,
          pointBackgroundColor: '#2563eb',
        }]
      },
      plugins: [backgroundPlugin],
      options: {
        responsive: true,
        maintainAspectRatio: true,
        interaction: {
          mode: 'index', // 同じ x 座標の全データポイントを対象
          intersect: false // データポイントを直接通過しなくても反応
        },
        plugins: {
          legend: {
            display: false
          },
          tooltip: {
            callbacks: {
              title: function(contexts) {
                return "点数: " + contexts[0].raw.y + "\n確率: " + contexts[0].raw.originalX.toFixed(4) + '%';
              },
              label: function(context) {
                return '';
              }
            }
          }
        },
        scales: {
          x: {
            type: 'linear',
            title: {
              display: true,
              text: '確率(%)',
              font: { size: 14 }
            },
            reverse: true,
            min: 0,
            max: labels.length-1,
    	    ticks: {
    	      count: labels.length,
              callback: (i, index, ticks) => {
                return labels[i] !== undefined ? labels[i] : '';
              }
            }
          },
          y: {
            title: {
              display: true,
              text: '点数',
              font: { size: 14 }
            },
            ticks: {
              //動的に作成
            }
          },
          yRight: {
            // 動的に作成
          }
        },
        onResize(chart, size) {
          // グラフ幅が狭いときは右軸を非表示
          const showRight = size.width > 480;
          const scales = chart.options.scales;
          if (scales.yRight.display == showRight) return;
          scales.yRight.display = showRight;
          chart.update();
        }
      }
    });

    let rangeTicksMax = -1;

    function updateDisplay() {
      const polishmax = +polishslider.max;
      const polish = +polishslider.value;
      const stage = +slider.value;

      if (rangeTicksMax !== polishmax) {
        rangeTicksMax = polishmax;
        refreshRangeTicks();
      }

      polishvalue.textContent = polish;
      stageValue.textContent = stage;
      syncRangeFills();
      
      const jobstat = jobstatus[jobselect.value];
      const data = getTableList(stage, polish).map(([point, prob]) => [point*jobstat, +(prob*100)]);

      // テーブル更新
      tableBody.innerHTML = data.map(([point, prob]) => 
        `<tr><td>${point}</td><td>${prob.toFixed(8)} %</td></tr>`
      ).join('');
      // グラフ更新
      const dataset = chart.data.datasets[0];
      // グラフが空から表示するとぎこちないのでアニメーション切る
      const wasEmpty = false;// dataset.data.length <= 1;
      dataset.data = data.map(([point, prob]) =>{
        return {x: mapXToLinearIndex(prob), y: point, originalX: prob};
      });
      const scales = chart.options.scales;
      let min = data[0][0];
      let max = data[data.length-1][0];
      Object.assign(scales.y, {
         min: Math.max(0, Math.floor(min/100) * 100),
         max: Math.max(100, Math.ceil(max/100) * 100), // min=maxだとグラフ表示がぎこちなくなる
         ticks: {
           count: 10+1,
         }
      });
      scales.yRight = {
        ...scales.y,
        position: 'right',
        title: {},
        display: chart.width > 480
      }
      chart.update();

      const text = `研磨 ${startpolishselect.value}→${polish} 区間のステータス点数の確率`;
      chartTitle.textContent = `${text}（グラフ）`;
      tableTitle.textContent = `${text}（テーブル）`;
    }
    
    
    /* データ */
    const probpattern = [
      [65, 5, 10, 20], // 1,2,3
      [70, 6, 9, 15], // 4,5
      [75, 7, 8, 10], // 6,7
      [80, 8, 7, 5], // 8,9
      [85, 9, 4, 2], // 10
      [65, 15, 10, 10], //11
      [70, 10, 10, 10], //12
      [80, 10,  5,  5], //13
      [85, 6, 5, 4], //14
      [90, 5, 3, 2], //15
      /* 以降不明 */
    ];
    const probtable = [0,0,0,1,1, 2,2,3,3,4, 5,6,7,8,9];
    const pointpattern = [
      [1, 2, 3, 4],
      [2, 4, 6, 8],
      [3, 6, 9, 12],
      [4, 8, 12, 16],
    ];
    const jobstatus = {
      normal: 25,
      da: 525,
      xenon: 12
    };
    const pointtable = [
      ...new Array(5).fill(0), ...new Array(5).fill(1),
      ...new Array(5).fill(2), ...new Array(5).fill(3),
    ];
    /* 研磨確率表のみ不明なのでprobtableの長さに合わせる */
    const polishdata = probtable.map( (patternidx, idx) => {
      return {
        probs: probpattern[patternidx],
        points: pointpattern[pointtable[idx]], 
      };
    });

    polishslider.max = slider.max = polishdata.length;

    function getTableList(stage, polish){
      const table1 = probtable.map(e => probpattern[e]);
      const table2 = pointtable.map(e => pointpattern[e]);
      
      // 加工補正のリストを作成
      const adjust = [
        ...new Array(5).fill(3), ...new Array(5).fill(4),
        ...new Array(5).fill(5), ...new Array(5).fill(6),
      ]; 
      for(var i = stage; i < adjust.length; i++){
        adjust[i] = 1;
      }
      
      // 等価パターンのグループ化
      const groups = {};
      for (let i = +startpolishselect.value; i < polish; i++) {
        const key = JSON.stringify({ prob: polishdata[i].probs, adj: adjust[i] });
        if (!groups[key]) groups[key] = { ...polishdata[i], adj: adjust[i], count: 0 };
        groups[key].count++;
      }
      
      // 各グループの分布計算
      let totalDist = new Map([[0, 1]]);
      for (const g of Object.values(groups)) {
        const singleDist = getDistribution(g.probs, g.points, g.adj);
        const repeatedDist = powerDistribution(singleDist, g.count);
        totalDist = combineDistributions(totalDist, repeatedDist);
      }

      // 結果をソート
      const sorted = Array.from(totalDist.entries()).sort((a,b)=>a[0]-b[0]);
      
      // 累積確率表に変換
      const retlist = [];
      let probsum = 1;
      sorted.forEach(arr=>{
        retlist.push([arr[0], Math.max(0, probsum)]);
        probsum -= arr[1];
      });
      
      return retlist;
      
      // 計算用関数
      function combineDistributions(dist1, dist2) {
        const result = new Map();
        for (const [s1, p1] of dist1) {
          for (const [s2, p2] of dist2) {
            const score = s1 + s2;
            result.set(score, (result.get(score) || 0) + p1 * p2);
          }
        }
        return result;
      }
      
      function powerDistribution(dist, n) {
        let result = new Map([[0, 1]]);
        for (let i = 0; i < n; i++) {
          result = combineDistributions(result, dist);
        }
        return result;
      }
      
      function getDistribution(prob, points, adj) {
        const total = prob.reduce((a, b) => a + b, 0);
        const map = new Map();
        for (let i = 0; i < prob.length; i++) {
          const score = points[i] * adj;
          const p = prob[i] / total;
          map.set(score, (map.get(score) || 0) + p);
        }
        return map;
      }
    }

    polishslider.addEventListener('input', updateDisplay);
    slider.addEventListener('input', updateDisplay);

    // 初期表示
    polishslider.value = polishdata.length;
    slider.value = 10;
    updateDisplay();
  </script>
</body>

</html>
